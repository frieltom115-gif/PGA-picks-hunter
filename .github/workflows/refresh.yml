name: Refresh PGA odds model
on:
  workflow_dispatch:
  schedule:
    - cron: "17 */4 * * *"
jobs:
  test-and-refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm test
      - run: npm run refresh:open
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
      - uses: actions/upload-artifact@v4
        with:
          name: open-championship-refresh
          path: data/latest-run.json
